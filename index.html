    <style>
      /* ===== RESET & VARIABLES ===== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      :root {
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --primary-light: #3b82f6;
        --success: #16a34a;
        --warning: #f59e0b;
        --danger: #dc2626;
        --purple: #9333ea;
        --gray-100: #f8f9fa;
        --gray-200: #e9ecef;
        --gray-300: #dee2e6;
        --gray-600: #6c757d;
        --gray-900: #212529;

        --bg-primary: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
        --bg-secondary: #ffffff;
        --text-primary: #1f2937;
        --text-secondary: #6b7280;
        --border-color: #e5e7eb;
        --card-bg: #ffffff;
        --header-gradient: linear-gradient(135deg, #2563eb 0%, #3b82f6 50%, #60a5fa 100%);
        --shadow: 0 4px 12px rgba(37, 99, 235, 0.12);
        --shadow-lg: 0 8px 24px rgba(37, 99, 235, 0.18);
      }

      [data-theme="dark"] {
        --bg-primary: linear-gradient(180deg, #111827 0%, #1f2937 100%);
        --bg-secondary: #1f2937;
        --text-primary: #f9fafb;
        --text-secondary: #9ca3af;
        --border-color: #374151;
        --card-bg: #374151;
        --header-gradient: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%);
        --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        line-height: 1.5;
      }

      select,
      input,
      textarea {
        width: 100%;
        padding: 14px;
        border: 2px solid var(--border-color);
        border-radius: 12px;
        font-size: 16px;
        background: var(--card-bg);
        color: var(--text-primary);
        margin-bottom: 12px;
      }
      .btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 14px 20px;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        margin: 4px 0;
      }
      .btn-sm {
        padding: 8px 16px;
        font-size: 13px;
        border-radius: 8px;
        width: auto;
      }
      .card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 16px;
        margin: 16px;
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow);
      }

      /* Header */
      .header {
        background: var(--header-gradient);
        color: white;
        padding: 12px 16px;
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: var(--shadow);
      }
      .nav-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      /* Metrics Grid - YOUR ORIGINAL STYLES */
      .metrics-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 16px;
      }
      @media (min-width: 640px) {
        .metrics-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (min-width: 1024px) {
        .metrics-grid {
          grid-template-columns: repeat(4, 1fr);
        }
      }

      .metric-card {
        background: var(--card-bg);
        padding: 16px;
        border-radius: 16px;
        border: 1px solid var(--border-color);
        display: flex;
        align-items: center;

        box-shadow: var(--shadow);

      .metric-card:nth-child(2) {
        animation-delay: 0.2s;
      }
      .metric-card:nth-child(3) {
        animation-delay: 0.3s;
      }

        animation-delay: 0.4s;

        box-shadow: var(--shadow-lg);
        transform: translateY(-2px);
      }

      .metric-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;

        text-overflow: ellipsis;

      /* Action Grid */

        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;

        border-radius: 20px;
        font-size: 13px;

        align-items: center;

        border-radius: 20px;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        gap: 6px;

      /* Menus */
      .menu-dropdown,

        position: absolute;
        top: 70px;
        right: 16px;
        width: 280px;
        background: var(--card-bg);
        border-radius: 16px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border-color);
        display: none;
        z-index: 1000;
      }
      .menu-dropdown.active,
      .notification-dropdown.active {
        display: block;
      }
      .menu-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px;
        border-bottom: 1px solid var(--border-color);
        cursor: pointer;
      }
      .menu-item i {
        width: 24px;
        color: var(--primary);
      }

      /* Animations */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideInRight {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .fancy-card {
        position: relative;
        overflow: hidden;
      }
      .fancy-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), var(--primary-light), #60a5fa);
      }

      .notification-badge {
        position: absolute;
        top: -4px;
        right: -4px;

        height: 18px;
        font-size: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .d-none {
        display: none;
      }

      /* Enhanced Animations */
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideInLeft {
        from {
          opacity: 0;
          transform: translateX(-30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);

            0 0 30px var(--primary-light);
        }
      }

      /* Card hover effects */
      .metric-card {
        position: relative;
      }
      .metric-card::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;

        pointer-events: none;

      .action-btn:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg);
        background: var(--primary);
      }
      .action-btn:hover i,
      .action-btn:hover span {
        color: white;
      }
      .action-btn:nth-child(1) {
        animation-delay: 0.1s;
      }
      .action-btn:nth-child(2) {
        animation-delay: 0.15s;
      }
      .action-btn:nth-child(3) {
        animation-delay: 0.2s;
      }
      .action-btn:nth-child(4) {
        animation-delay: 0.25s;
      }
      .action-btn:nth-child(5) {
        animation-delay: 0.3s;
      }
      .action-btn:nth-child(6) {
        animation-delay: 0.35s;
      }
      .action-btn:nth-child(7) {
        animation-delay: 0.4s;
      }
      .action-btn:nth-child(8) {
        animation-delay: 0.45s;
      }
      .action-btn:nth-child(9) {
        animation-delay: 0.5s;
      }

      /* Enhanced button styles */
      .btn {
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
      }
      .btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.5s;
      }
      .btn:hover::before {
        left: 100%;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-lg);
      }

      /* Member row hover */
      .member-row:hover .avatar {
        transform: scale(1.1);
      }
      .avatar {
        transition: transform 0.3s ease;
      }

      /* Toast animations */
      .toast-enter {
        animation: slideDown 0.3s ease forwards;
      }

      /* Dropdown menu enhancements */
      .menu-dropdown {
        animation: slideDown 0.2s ease forwards;
        border-top: 3px solid var(--primary);
      }
      .menu-item:last-child {
        border-bottom: none;
      }
      .menu-item:hover {
        background: rgba(37, 99, 235, 0.05);
      }

      /* Input focus states */
      select:focus,
      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
      }

      /* Quick actions section */
      .quick-actions-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      /* Header title gradient */
      .header-title h1 {
        background: linear-gradient(90deg, #fff, rgba(255, 255, 255, 0.8));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Loading spinner */
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border-color);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Enhanced header */
      .header {
        backdrop-filter: blur(10px);
        background: var(--header-gradient) !important;
      }

      /* Member dashboard card */
      .member-dashboard-card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 20px;
        margin: 16px;
        border: 1px solid var(--border-color);
        box-shadow: var(--shadow);
        animation: fadeInUp 0.5s ease forwards;
      }

      /* Status badges enhanced */
      .status-paid {
        background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
        color: #2e7d32;
        border: 1px solid #a5d6a7;
      }
      .status-due {
        background: linear-gradient(135deg, #ffebee, #ffcdd2);
        color: #c62828;
        border: 1px solid #ef9a9a;
      }

      /* Transaction item enhanced */
      .transaction-item {
        transition: all 0.3s ease;
      }
      .transaction-item:hover {
        transform: translateX(4px);
        border-color: var(--primary);
        box-shadow: var(--shadow);
      }

      /* Login page enhancements */
      .login-card {
        animation: fadeInUp 0.6s ease forwards;

      /* Admin menu toggle */
      .menu-toggle {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.2);

        cursor: pointer;

      .menu-toggle:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: rotate(90deg);
      }

      /* Enhanced card shadows based on theme */
      .card {
        transition: all 0.3s ease;
      }
      .card:hover {
        box-shadow: var(--shadow-lg);
      }

      /* Network status indicator */
      .network-online {
        color: #4caf50;
      }
      .network-offline {
        color: #f44336;
      }

    <div id="app"></div>

    <script>
      // Firebase Config
      const firebaseConfig = {
          apiKey: "AIzaSyAYYE4-vtk3XXPdvwJ8-BWxiyJiKPASsnM",
          authDomain: "savers-group-app.firebaseapp.com",
          projectId: "savers-group-app",
          storageBucket: "savers-group-app.firebasestorage.app",
          messagingSenderId: "722000008713",
          appId: "1:722000008713:web:5322f5a668bfcd6ff4cad8"
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

              // ===== AUTO-CREATE FIREBASE COLLECTIONS =====
      async function ensureFirebaseSetup() {
          try {
              const mainDocRef = db.collection('groups').doc('main');
              const docSnap = await mainDocRef.get();

              if (!docSnap.exists) {
                  console.log('ðŸ“ Creating Firebase collections...');
                  await mainDocRef.set({
                      members: [],
                      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                      lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                  });
                  console.log('âœ… Firebase collection "groups/main" created successfully!');
              } else {
                  console.log('âœ… Firebase collection already exists');
              }
              return true;
          } catch (e) {
              console.error('âŒ Error creating Firebase collection:', e);
              return false;
          }
      }

      let members = [], currentUser = null, selectedLoanMemberId = null, screenHistory = [];
      const RULES = {
          MIN_SAVINGS: 200,
          MEMBERSHIP_FEE: 50,
          SOCIAL_FUND: 100,
          INTEREST: 0.10,
          CALCULATION_TYPE: 'ledger' // 'simple' or 'ledger' - ledger matches Excel format
      };

      // ===== DETAILED LEDGER CALCULATIONS (matches Excel) =====
      function calculateLedgerSavings(member) {
          const txs = member.transactions || [];
          let cumulativeSavings = member.initialSavings || 0;
          let cumulativeInterest = 0;
          const ledger = [];

          // Sort transactions by date
          const sortedTxs = txs.filter(t => t.type === 'savings' || t.type === 'savings-interest').sort((a,b) => new Date(a.date) - new Date(b.date));

          sortedTxs.forEach(tx => {
              if (tx.type === 'savings') {
                  const interest = cumulativeSavings * RULES.INTEREST;
                  cumulativeInterest += interest;
                  cumulativeSavings += tx.amount + interest;
                  ledger.push({
                      date: tx.date,
                      monthlySavings: tx.amount,
                      cumulativeSavings: cumulativeSavings,
                      interest: interest,
                      totalWithInterest: cumulativeSavings + cumulativeInterest
                  });
              }
          });

          return { cumulativeSavings, cumulativeInterest, totalValue: cumulativeSavings + cumulativeInterest, ledger };
      }

      function calculateLedgerLoans(member) {
          const txs = member.transactions || [];
          let principle = member.loanPrincipal || 0;
          let balance = principle;
          const ledger = [];

          const sortedTxs = txs.filter(t => t.type === 'loan' || t.type === 'repayment').sort((a,b) => new Date(a.date) - new Date(b.date));

          sortedTxs.forEach(tx => {
              const interest = principle * RULES.INTEREST;
              if (tx.type === 'loan') {
                  principle = tx.amount;
                  balance = principle;
                  ledger.push({
                      date: tx.date,
                      principle: tx.amount,
                      interest: interest,
                      totalLoan: principle + interest,
                      payment: 0,
                      loanBalance: balance,
                      topUp: tx.amount
                  });
              } else if (tx.type === 'repayment') {
                  balance = Math.max(0, balance - tx.payment);
                  ledger.push({
                      date: tx.date,
                      principle: principle,
                      interest: interest,
                      totalLoan: principle + interest,
                      payment: tx.amount,
                      loanBalance: balance,
                      topUp: 0
                  });
              }
          });

          const totalInterest = principle * RULES.INTEREST;
          return { principle, totalWithInterest: principle + totalInterest, interest: totalInterest, balance, ledger };
      }

      function calculateNetPosition(member) {
          const savings = calculateLedgerSavings(member);
          const loans = calculateLedgerLoans(member);
          const netPosition = savings.totalValue - loans.totalWithInterest;
          const shareOut = netPosition * 0.10;
          return { netPosition, shareOut, savings, loans };
      }

      function navigateTo(screenFn, screenName) { screenHistory.push(screenName); updateNavButtons(); screenFn(); }
      function goBack() { if (screenHistory.length > 1) { screenHistory.pop(); updateNavButtons(); const prev = screenHistory[screenHistory.length-1]; if (prev === 'admin' && currentUser?.type === 'admin') showAdminDashboard(); else if (prev === 'member' && currentUser?.type === 'member') showMemberDashboard(currentUser.id); else logout(); } else logout(); }
      function updateNavButtons() { const backBtn = document.getElementById('backBtn'); if (backBtn) backBtn.style.display = screenHistory.length > 1 ? 'flex' : 'none'; }

      async function saveEditedMember(memberId) {
          const member = members.find(m => m.id === memberId);
          if (!member) return;
          const name = document.getElementById('editName')?.value.trim();
          const phone = document.getElementById('editPhone')?.value.trim();
          const createdDate = document.getElementById('editCreatedDate')?.value;
          const pin = document.getElementById('editPin')?.value.trim();
          const savings = parseFloat(document.getElementById('editSavings')?.value) || 0;
          const loan = parseFloat(document.getElementById('editLoan')?.value) || 0;
          const membershipPaid = document.getElementById('editMembership')?.checked || false;
          const socialPaid = document.getElementById('editSocial')?.checked || false;
          if (!name) { alert('Name cannot be empty'); return; }
          Object.assign(member, { name, phone, createdDate: createdDate ? new Date(createdDate).toISOString() : member.createdDate, pin, savings, loanPrincipal: loan, membershipPaid, socialPaid });
          member.transactions = member.transactions || [];
          member.transactions.push({ type: 'admin-edit', amount: 0, date: new Date().toISOString(), note: 'Admin edited member' });
          await saveMembers();
          NotificationManager.add('Member updated successfully', 'success');
          viewMember(member.id);
      }

      async function resetMemberPin(memberId) {
          const member = members.find(m => m.id === memberId);
          if (!member) return;
          if (confirm(`Reset PIN for ${member.name} to last 4 digits of phone?`)) {
              member.pin = (member.phone || '').slice(-4) || '0000';
              await saveMembers();
              NotificationManager.add(`PIN reset to ${member.pin}`, 'success');
              viewMember(member.id);
          }
      }

      async function deleteMember(memberId) {
          const member = members.find(m => m.id === memberId);
          if (!member) return;
          if (confirm(`Delete ${member.name}? This cannot be undone.`)) {
              const index = members.indexOf(member);
              if (index > -1) { members.splice(index, 1); await saveMembers(); NotificationManager.add('Member deleted', 'success'); showAllMembers(); }
          }
      }

      async function processRepaymentFromMember(mid) {
          const m = members.find(m=>m.id===mid);
          const amt = parseFloat(document.getElementById('repayAmountMember')?.value);
          if(m && amt > 0) {
              m.loanPrincipal = Math.max(0, (m.loanPrincipal||0) - amt);
              m.transactions = m.transactions||[];
              m.transactions.push({type:'repayment',payment:amt,amount:amt,date:new Date().toISOString(),note:'Loan payment'});
              await saveMembers();
              NotificationManager.add(`K${amt} payment recorded for ${m.name}`, 'success');
              showMemberLoansTab(mid);
          }
      }

      function addSavingsFor(mid) { showAddSavings(); setTimeout(()=>{ const s=document.getElementById('savingsMember'); if(s) s.value=mid; },100); }

      function showContractLoan() { const mid = document.getElementById('loanMember')?.value; if(!mid) return; selectedLoanMemberId=mid; const m = members.find(m=>m.id===mid); document.getElementById('contentArea').innerHTML = `<div class="card"><h3>Contract Loan for ${m.name}</h3><input type="number" id="loanAmount" value="1000" step="100"><div style="background:#fff3e0;padding:16px;border-radius:12px;margin:20px 0;"><p>10% Interest: K<span id="loanInterest">100</span></p><p>Total: K<span id="loanTotal">1100</span></p></div><div style="display:flex;gap:12px;"><button class="btn" onclick="contractLoan()">âœ… Contract</button><button class="btn" onclick="goBack()">â†©ï¸ Back</button></div></div>`; document.getElementById('loanAmount').oninput = function() { const amt = parseFloat(this.value)||0; document.getElementById('loanInterest').textContent = (amt*RULES.INTEREST).toFixed(2); document.getElementById('loanTotal').textContent = (amt*(1+RULES.INTEREST)).toFixed(2); }; }

      function exportShareAccountCSV() {
          const totalSavings = members.reduce((s,m)=>s+(m.savings||0),0), totalLoans = members.reduce((s,m)=>s+((m.loanPrincipal||0)*(1+RULES.INTEREST)),0), net = totalSavings-totalLoans, sharePool = net*0.1;
          let csv = "Member Name,Net Position,Share Out Amount\n";
          members.forEach(m=>{
              const memberNet = ((m.savings||0)*(1+RULES.INTEREST))-((m.loanPrincipal||0)*(1+RULES.INTEREST));
              const takeHome = net!==0 ? (sharePool*(memberNet/net)) : 0;
              csv += `${m.name},${memberNet.toFixed(2)},${takeHome.toFixed(2)}\n`;
          });
          csv += `\nSummary\nGroup Savings,${totalSavings}\nGroup Loans,${totalLoans}\nNet Value,${net}\nShare Pool (10%),${sharePool.toFixed(2)}`;
          const blob = new Blob([csv], {type: 'text/csv'});
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `share_account_${new Date().toISOString().split('T')[0]}.csv`;

          NotificationManager.add('Share account exported!', 'success');
      }

     let memberImportData = [];
function handleMemberCSV(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        const lines = ev.target.result.split('\n');
        memberImportData = [];
        for (let i = 1; i < lines.length; i++) {
            const vals = lines[i].split(',').map(v => v.trim().replace(/"/g, ''));
            if (vals[0]) {
                // FIX: Define joinDate outside the nested IF so it's accessible
                let rawDate = vals[2] || new Date().toISOString().split('T')[0];
                if (rawDate.includes('/')) {
                    const parts = rawDate.split('/');
                    if (parts.length === 3) {
                        rawDate = `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                    }
                }
                memberImportData.push({
                    name: vals[0],
                    phone: vals[1],
                    joinDate: rawDate, // Using the processed date
                    savings: parseFloat(vals[3]) || 200,
                    membershipPaid: vals[4]?.toLowerCase() === 'yes',
                    socialPaid: vals[5]?.toLowerCase() === 'yes'
                });
            }
        }
        document.getElementById('memberImportPreview').innerHTML = `<p>${memberImportData.length} members ready to import</p>`;
    };
    reader.readAsText(file);
}

async function confirmMemberImport() {
    let newCount = 0, updateCount = 0;
    for (const d of memberImportData) {
        const joinDate = d.joinDate ? new Date(d.joinDate) : new Date();
        const dateStr = isNaN(joinDate.getTime()) ? new Date().toISOString() : joinDate.toISOString();
        const existing = members.find(m => m.phone === d.phone);
        if (existing) {
            existing.name = d.name;
            existing.savings = d.savings;
            existing.membershipPaid = d.membershipPaid;
            existing.socialPaid = d.socialPaid;
            existing.createdDate = dateStr;
            updateCount++;
        } else {
            members.push({
                id: Date.now().toString() + Math.random().toString(36).substr(2, 4),
                name: d.name,
                phone: d.phone,
                createdDate: dateStr,
                savings: d.savings,
                loanPrincipal: 0,
                membershipPaid: d.membershipPaid,
                socialPaid: d.socialPaid,
                pin: d.phone ? d.phone.slice(-4) : "1234",
                transactions: [{ type: 'savings', amount: d.savings, date: dateStr, note: 'CSV import' }]
            });
            newCount++;
        }
    }
    await saveMembers();
    NotificationManager.add(`✅ ${newCount} new, ${updateCount} updated`, 'success');
    if (typeof goBack === "function") goBack();
}

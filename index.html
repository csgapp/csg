        // ===== HELPER: Parse dates in multiple formats (DD/MM/YYYY, DD-MM-YYYY, YYYY-MM-DD) =====
        function parseFlexibleDate(dateStr) {
            if (!dateStr) return new Date();
            
            // Try YYYY-MM-DD first
            let date = new Date(dateStr);
            if (!isNaN(date.getTime())) return date;
            
            // Try DD/MM/YYYY or DD-MM-YYYY
            let parts = dateStr.split(/[\/\-]/);
            if (parts.length === 3) {
                let day = parseInt(parts[0], 10);
                let month = parseInt(parts[1], 10) - 1;
                let year = parseInt(parts[2], 10);
                if (year < 100) year += 2000;
                date = new Date(year, month, day);
                if (!isNaN(date.getTime())) return date;
            }
            
            // Fallback to current date
            console.warn('Could not parse date:', dateStr, 'using current date');
            return new Date();
        }
        
        async function ensureFirebaseSetup() {
            try {
                const mainDocRef = db.collection('groups').doc('main');
                const docSnap = await mainDocRef.get();
        
                if (!docSnap.exists) {
                    console.log('📁 Creating Firebase collections...');
                    await mainDocRef.set({
                        members: [],
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    console.log('✅ Firebase collection "groups/main" created successfully!');
                } else {
                    console.log('✅ Firebase collection already exists');
                }
                return true;
            } catch (e) {
                console.error('❌ Error creating Firebase collection:', e);
                return false;
            }
        }
        
        let members = [], currentUser = null, selectedLoanMemberId = null, screenHistory = [];
        const RULES = {
            MIN_SAVINGS: 200,
            MEMBERSHIP_FEE: 50,
            SOCIAL_FUND: 100,
            INTEREST: 0.10,
            CALCULATION_TYPE: 'ledger'
        };
        
        // ===== DETAILED LEDGER CALCULATIONS =====
        function calculateLedgerSavings(member) {
            const txs = member.transactions || [];
            let cumulativeSavings = member.initialSavings || 0;
            let cumulativeInterest = 0;
            const ledger = [];
        
            const sortedTxs = txs.filter(t => t.type === 'savings' || t.type === 'savings-interest').sort((a,b) => new Date(a.date) - new Date(b.date));
        
            sortedTxs.forEach(tx => {
                if (tx.type === 'savings') {
                    const interest = cumulativeSavings * RULES.INTEREST;
                    cumulativeInterest += interest;
                    cumulativeSavings += tx.amount + interest;
                    ledger.push({
                        date: tx.date,
                        monthlySavings: tx.amount,
                        cumulativeSavings: cumulativeSavings,
                        interest: interest,
                        totalWithInterest: cumulativeSavings + cumulativeInterest
                    });
                }
            });
        
            return { cumulativeSavings, cumulativeInterest, totalValue: cumulativeSavings + cumulativeInterest, ledger };
        }
        
        function calculateLedgerLoans(member) {
            const txs = member.transactions || [];
            let principle = member.loanPrincipal || 0;
            let balance = principle;
            const ledger = [];
        
            const sortedTxs = txs.filter(t => t.type === 'loan' || t.type === 'repayment').sort((a,b) => new Date(a.date) - new Date(b.date));
        
            sortedTxs.forEach(tx => {
                const interest = principle * RULES.INTEREST;
                if (tx.type === 'loan') {
                    principle = tx.amount;
                    balance = principle;
                    ledger.push({
                        date: tx.date,
                        principle: tx.amount,
                        interest: interest,
                        totalLoan: principle + interest,
                        payment: 0,
                        loanBalance: balance,
                        topUp: tx.amount
                    });
                } else if (tx.type === 'repayment') {
                    balance = Math.max(0, balance - (tx.payment || tx.amount));
                    ledger.push({
                        date: tx.date,
                        principle: principle,
                        interest: interest,
                        totalLoan: principle + interest,
                        payment: tx.amount,
                        loanBalance: balance,
                        topUp: 0
                    });
                }
            });
        
            const totalInterest = principle * RULES.INTEREST;
            return { principle, totalWithInterest: principle + totalInterest, interest: totalInterest, balance, ledger };
        }
        
        function calculateNetPosition(member) {
            const savings = calculateLedgerSavings(member);
            const loans = calculateLedgerLoans(member);
            const netPosition = savings.totalValue - loans.totalWithInterest;
            const shareOut = netPosition * 0.10;
            return { netPosition, shareOut, savings, loans };
        }
        
        function navigateTo(screenFn, screenName) { screenHistory.push(screenName); updateNavButtons(); screenFn(); }
        function goBack() { if (screenHistory.length > 1) { screenHistory.pop(); updateNavButtons(); const prev = screenHistory[screenHistory.length-1]; if (prev === 'admin' && currentUser?.type === 'admin') showAdminDashboard(); else if (prev === 'member' && currentUser?.type === 'member') showMemberDashboard(currentUser.id); else logout(); } else logout(); }
        function updateNavButtons() { const backBtn = document.getElementById('backBtn'); if (backBtn) backBtn.style.display = screenHistory.length > 1 ? 'flex' : 'none'; }
        
        const NotificationManager = {
            notifications: [], init() { const saved = localStorage.getItem('notifications'); this.notifications = saved ? JSON.parse(saved) : []; },
            add(message, type='info') { const n = { id: Date.now(), message, type, timestamp: new Date().toISOString(), read: false }; this.notifications.unshift(n); this.save(); this.renderBadge(); this.showToast(message, type); },
            save() { localStorage.setItem('notifications', JSON.stringify(this.notifications)); },
            markAsRead(id) { const n = this.notifications.find(n=>n.id===id); if(n) n.read=true; this.save(); this.renderBadge(); this.renderDropdown(); },
            markAllRead() { this.notifications.forEach(n=>n.read=true); this.save(); this.renderBadge(); this.renderDropdown(); },
            showToast(msg, type) { const toast = document.createElement('div'); toast.style.cssText = `position:fixed;top:20px;left:16px;right:16px;background:${type==='success'?'#2e7d32':type==='error'?'#f44336':'#1e88e5'};color:white;padding:14px;border-radius:12px;z-index:9999;animation:slideDown 0.3s;max-width:400px;margin:auto;`; toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':type==='error'?'fa-exclamation-circle':'fa-info-circle'}"></i> ${msg}`; document.body.appendChild(toast); setTimeout(()=>toast.remove(), 3000); },
            renderBadge() {
                const unread = this.notifications.filter(n=>!n.read).length;
                const badgeInMenu = document.getElementById('notificationBadge');
                const badgeInHeader = document.getElementById('notificationBadgeTop');
                const display = unread>0?'flex':'none';
                if(badgeInMenu) { badgeInMenu.textContent = unread; badgeInMenu.style.display = display; }
                if(badgeInHeader) { badgeInHeader.textContent = unread; badgeInHeader.style.display = display; }
            },
            renderDropdown() { const c = document.getElementById('notificationDropdown'); if(!c) return; let html = '<div class="notif-header"><div><h4>Notifications</h4><button onclick="NotificationManager.markAllRead();">Mark all read</button></div></div>'; if(this.notifications.length===0) html+='<div class="notif-empty">No notifications</div>'; else this.notifications.slice(0,5).forEach(n=>{ html+=`<div class="notif-item ${n.read?'read':''}" onclick="NotificationManager.markAsRead(${n.id})"><div><i class="fas ${n.type==='success'?'fa-check-circle':n.type==='error'?'fa-exclamation-circle':'fa-bell'}"></i> ${n.message}<div class="notif-time">${new Date(n.timestamp).toLocaleDateString()}</div></div></div>`; }); c.innerHTML = html; }
        };
        
        const ThemeManager = {
            init() { const theme = localStorage.getItem('theme')||'light'; document.documentElement.setAttribute('data-theme', theme); },
            toggle() { const curr = document.documentElement.getAttribute('data-theme'); const next = curr==='light'?'dark':'light'; document.documentElement.setAttribute('data-theme', next); localStorage.setItem('theme', next); this.updateUI(); },
            updateUI() { const t = document.getElementById('themeToggle'); if(t) t.innerHTML = document.documentElement.getAttribute('data-theme')==='light'?'<i class="fas fa-moon"></i><span>Dark Mode</span>':'<i class="fas fa-sun"></i><span>Light Mode</span>'; },
            closeAllMenus() { document.querySelectorAll('.menu-dropdown.active, .notification-dropdown.active').forEach(el=>el.classList.remove('active')); }
        };
        
        async function loadMembers() {
            try {
                await ensureFirebaseSetup();
                const docRef = db.collection('groups').doc('main');
                const doc = await docRef.get();
                if(doc.exists) {
                    const data = doc.data();
                    members = data.members || [];
                    console.log(`✅ Loaded ${members.length} members from Firebase`);
                } else {
                    members = [];
                }
                localStorage.setItem('members', JSON.stringify(members));
            } catch(e) {
                console.log('Firebase error, using localStorage:', e);
                const local = localStorage.getItem('members');
                if(local) members = JSON.parse(local);
            }
        }
        
        async function saveMembers() { localStorage.setItem('members', JSON.stringify(members)); if(!navigator.onLine) return; try { await db.collection('groups').doc('main').set({ members, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }); } catch(e) { console.log(e); } }
        function fmtDate(iso) { try { return new Date(iso).toLocaleDateString('en-ZM'); } catch(e) { return iso; } }
        function formatCurrency(amt) { return 'K' + (amt||0).toLocaleString(); }
        function closeAllMenus() { ThemeManager.closeAllMenus(); }
        
        // ===== LOGIN =====
        function showAdminLogin() { document.getElementById('loginForm').innerHTML = `<input type="text" id="username" value="admin" placeholder="Admin username"><input type="password" id="password" value="ChiSave" placeholder="Admin password"><button onclick="login('admin')">🔐 ADMIN LOGIN</button>`; }
        function showMemberLogin() { const form = document.getElementById('loginForm'); if(!members.length) { form.innerHTML = '<div>Loading members...</div>'; loadMembers().then(()=>showMemberLogin()); return; } form.innerHTML = `<select id="memberSelect"><option value="">-- Select Your Name --</option>${members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select><input type="password" id="memberPass" placeholder="PIN (last 4 digits)"><button onclick="login('member')">👤 MEMBER LOGIN</button>`; }
        function login(type) { if(type==='admin') { const u = document.getElementById('username')?.value, p = document.getElementById('password')?.value; if(u==='admin' && p==='ChiSave') { currentUser = { type:'admin', name:'Admin' }; NotificationManager.add('Welcome back, Admin!','success'); screenHistory = ['login','admin']; showAdminDashboard(); } else alert('Wrong username or password'); } else { const mid = document.getElementById('memberSelect')?.value, pass = document.getElementById('memberPass')?.value; if(!mid) { alert('Select your name'); return; } const m = members.find(m=>m.id===mid); const expectedPin = m.pin || (m.phone || '').slice(-4); if(m && pass === expectedPin) { currentUser = { type:'member', name:m.name, id:m.id }; NotificationManager.add(`Welcome back, ${m.name}!`,'success'); screenHistory = ['login','member']; showMemberDashboard(m.id); } else alert('Wrong PIN'); } }

                                <i class="fas fa-piggy-bank" style="font-size:40px;color:white;"></i>

        async function saveEditedMember(memberId) {
            const member = members.find(m => m.id === memberId);
            if (!member) return;
            const name = document.getElementById('editName')?.value.trim();
            const phone = document.getElementById('editPhone')?.value.trim();
            const createdDate = document.getElementById('editCreatedDate')?.value;
            const pin = document.getElementById('editPin')?.value.trim();
            const savings = parseFloat(document.getElementById('editSavings')?.value) || 0;
            const loan = parseFloat(document.getElementById('editLoan')?.value) || 0;
            const membershipPaid = document.getElementById('editMembership')?.checked || false;
            const socialPaid = document.getElementById('editSocial')?.checked || false;
            if (!name) { alert('Name cannot be empty'); return; }
            Object.assign(member, { name, phone, createdDate: createdDate ? new Date(createdDate).toISOString() : member.createdDate, pin, savings, loanPrincipal: loan, membershipPaid, socialPaid });
            member.transactions = member.transactions || [];
            member.transactions.push({ type: 'admin-edit', amount: 0, date: new Date().toISOString(), note: 'Admin edited member' });
            await saveMembers();
            NotificationManager.add('Member updated successfully', 'success');
            viewMember(member.id);
        }
        
        async function resetMemberPin(memberId) {
            const member = members.find(m => m.id === memberId);
            if (!member) return;
            if (confirm(`Reset PIN for ${member.name} to last 4 digits of phone?`)) {
                member.pin = (member.phone || '').slice(-4) || '0000';
                await saveMembers();
                NotificationManager.add(`PIN reset to ${member.pin}`, 'success');
                viewMember(member.id);
            }
        }
        
        async function deleteMember(memberId) {
            const member = members.find(m => m.id === memberId);
            if (!member) return;
            if (confirm(`Delete ${member.name}? This cannot be undone.`)) {
                const index = members.indexOf(member);
                if (index > -1) { members.splice(index, 1); await saveMembers(); NotificationManager.add('Member deleted', 'success'); showAllMembers(); }
            }
        }

        let transactionImportData = [];
        
        function handleTransactionCSV(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const lines = ev.target.result.split('\n');
                transactionImportData = [];
                for (let i = 1; i < lines.length; i++) {
                    const vals = lines[i].split(',').map(v => v.trim().replace(/"/g, ''));
                    if (vals[0] && vals[1] && vals[2]) {
                        const parsedDate = parseFlexibleDate(vals[3] || new Date().toISOString().split('T')[0]);
                        transactionImportData.push({
                            phone: vals[0],
                            type: vals[1].toLowerCase(),
                            amount: parseFloat(vals[2]),
                            date: parsedDate.toISOString(),
                            note: vals[4] || 'CSV import'
                        });
                    }
                }
                document.getElementById('transactionImportPreview').innerHTML = `<p style="padding:12px;background:#e8f5e9;border-radius:8px;">✅ ${transactionImportData.length} transactions ready to import</p>`;

            reader.readAsText(file);
        }
        
        async function confirmTransactionImport() {
            let success = 0, failed = 0;
            for (const d of transactionImportData) {
                const member = members.find(m => m.phone === d.phone);
                if (member) {
                    member.transactions = member.transactions || [];
                    member.transactions.push({
                        type: d.type,
                        amount: d.amount,
                        date: d.date,
                        note: d.note
                    });
                    
                    if (d.type === 'savings') {
                        member.savings = (member.savings || 0) + d.amount;
                    } else if (d.type === 'loan') {
                        member.loanPrincipal = (member.loanPrincipal || 0) + d.amount;
                    } else if (d.type === 'repayment') {
                        member.loanPrincipal = Math.max(0, (member.loanPrincipal || 0) - d.amount);
                    } else if (d.type === 'fee') {
                        if (d.amount === 50) member.membershipPaid = true;
                        if (d.amount === 100) member.socialPaid = true;
                    }
                    success++;
                } else {
                    failed++;
                }
            }
            await saveMembers();
            NotificationManager.add(`✅ ${success} imported, ${failed} failed (member not found)`, 'success');
            goBack();
        }

    <style>
        /* ===== RESET & VARIABLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --success: #16a34a;
            --warning: #f59e0b;
            --danger: #dc2626;
            --purple: #9333ea;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-600: #6c757d;
            --gray-900: #212529;
            
            --bg-primary: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
            --bg-secondary: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --card-bg: #ffffff;
            --header-gradient: linear-gradient(135deg, #2563eb 0%, #3b82f6 50%, #60a5fa 100%);
            --shadow: 0 4px 12px rgba(37, 99, 235, 0.12);
            --shadow-lg: 0 8px 24px rgba(37, 99, 235, 0.18);
        }
        
        [data-theme="dark"] {
            --bg-primary: linear-gradient(180deg, #111827 0%, #1f2937 100%);
            --bg-secondary: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border-color: #374151;
            --card-bg: #374151;
            --header-gradient: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; line-height: 1.5; }
        
        select, input, textarea { width: 100%; padding: 14px; border: 2px solid var(--border-color); border-radius: 12px; font-size: 16px; background: var(--card-bg); color: var(--text-primary); margin-bottom: 12px; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px 20px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; margin: 4px 0; }
        .btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 8px; width: auto; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 16px; margin: 16px; border: 1px solid var(--border-color); box-shadow: var(--shadow); }
        
        /* Header */
        .header { background: var(--header-gradient); color: white; padding: 12px 16px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); }
        .nav-btn { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* Metrics Grid - YOUR ORIGINAL STYLES */
        .metrics-grid { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 16px; }
        @media (min-width: 640px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .metrics-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .metric-card { background: var(--card-bg); padding: 16px; border-radius: 16px; border: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); transition: all 0.2s; position: relative; overflow: hidden; animation: fadeInUp 0.5s ease forwards; opacity: 0; }
        .metric-card:nth-child(1) { animation-delay: 0.1s; }
        .metric-card:nth-child(2) { animation-delay: 0.2s; }
        .metric-card:nth-child(3) { animation-delay: 0.3s; }
        .metric-card:nth-child(4) { animation-delay: 0.4s; }
        .metric-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
        
        .metric-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
        .metric-content { flex: 1; min-width: 0; }
        .metric-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .metric-value { font-size: 1.4rem; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Action Grid */
        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 16px 16px; }
        @media (min-width: 768px) { .action-grid { grid-template-columns: repeat(4, 1fr); } }
        
        .action-btn { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px 8px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s; animation: fadeInUp 0.5s ease forwards; opacity: 0; }
        .action-btn i { font-size: 24px; color: var(--primary); }
        .action-btn span { font-size: 12px; font-weight: 600; text-align: center; }
        
        /* Member Row */
        .member-row { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; transition: all 0.2s; animation: slideInRight 0.4s ease forwards; opacity: 0; }
        .member-row:hover { border-color: var(--primary); box-shadow: var(--shadow); }
        .avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; flex-shrink: 0; }
        .member-info { flex: 1; min-width: 0; }
        .member-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .member-details { display: flex; flex-wrap: wrap; gap: 8px; font-size: 12px; color: var(--text-secondary); }
        
        /* Transaction Item */
        .transaction-item { display: flex; gap: 12px; padding: 12px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; margin-bottom: 8px; }
        
        /* Status Badges */
        .status-paid { background: #e8f5e9; color: #2e7d32; padding: 8px 12px; border-radius: 20px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
        .status-due { background: #ffebee; color: #f44336; padding: 8px 12px; border-radius: 20px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
        
        /* Menus */
        .menu-dropdown, .notification-dropdown { position: absolute; top: 70px; right: 16px; width: 280px; background: var(--card-bg); border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--border-color); display: none; z-index: 1000; }
        .menu-dropdown.active, .notification-dropdown.active { display: block; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 16px; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        .menu-item i { width: 24px; color: var(--primary); }
        
        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        
        .fancy-card { position: relative; overflow: hidden; }
        .fancy-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, var(--primary), var(--primary-light), #60a5fa); }
        
        .notification-badge { position: absolute; top: -4px; right: -4px; background: var(--danger); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; display: flex; align-items: center; justify-content: center; }
        
        .d-none { display: none; }
        
        /* Enhanced Animations */
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px var(--primary); } 50% { box-shadow: 0 0 20px var(--primary), 0 0 30px var(--primary-light); } }
        
        /* Card hover effects */
        .metric-card { position: relative; }
        .metric-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%); pointer-events: none; }
        
        .action-btn:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); background: var(--primary); }
        .action-btn:hover i, .action-btn:hover span { color: white; }
        .action-btn:nth-child(1) { animation-delay: 0.1s; }
        .action-btn:nth-child(2) { animation-delay: 0.15s; }
        .action-btn:nth-child(3) { animation-delay: 0.2s; }
        .action-btn:nth-child(4) { animation-delay: 0.25s; }
        .action-btn:nth-child(5) { animation-delay: 0.3s; }
        .action-btn:nth-child(6) { animation-delay: 0.35s; }
        .action-btn:nth-child(7) { animation-delay: 0.4s; }
        .action-btn:nth-child(8) { animation-delay: 0.45s; }
        .action-btn:nth-child(9) { animation-delay: 0.5s; }
        
        /* Enhanced button styles */
        .btn { position: relative; overflow: hidden; transition: all 0.3s ease; }
        .btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: left 0.5s; }
        .btn:hover::before { left: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        
        /* Member row hover */
        .member-row:hover .avatar { transform: scale(1.1); }
        .avatar { transition: transform 0.3s ease; }
        
        /* Toast animations */
        .toast-enter { animation: slideDown 0.3s ease forwards; }
        
        /* Dropdown menu enhancements */
        .menu-dropdown { animation: slideDown 0.2s ease forwards; border-top: 3px solid var(--primary); }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: rgba(37, 99, 235, 0.05); }
        
        /* Input focus states */
        select:focus, input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        /* Quick actions section */
        .quick-actions-title { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 600; margin-bottom: 12px; }
        
        /* Header title gradient */
        .header-title h1 { background: linear-gradient(90deg, #fff, rgba(255,255,255,0.8)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        
        /* Loading spinner */
        .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border-color); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Enhanced header */
        .header { backdrop-filter: blur(10px); background: var(--header-gradient) !important; }
        
        /* Member dashboard card */
        .member-dashboard-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin: 16px; border: 1px solid var(--border-color); box-shadow: var(--shadow); animation: fadeInUp 0.5s ease forwards; }
        
        /* Status badges enhanced */
        .status-paid { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); color: #2e7d32; border: 1px solid #a5d6a7; }
        .status-due { background: linear-gradient(135deg, #ffebee, #ffcdd2); color: #c62828; border: 1px solid #ef9a9a; }
        
        /* Transaction item enhanced */
        .transaction-item { transition: all 0.3s ease; }
        .transaction-item:hover { transform: translateX(4px); border-color: var(--primary); box-shadow: var(--shadow); }
        
        /* Login page enhancements */
        .login-card { animation: fadeInUp 0.6s ease forwards; }
        
        /* Admin menu toggle */
        .menu-toggle { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .menu-toggle:hover { background: rgba(255,255,255,0.3); transform: rotate(90deg); }
        
        /* Enhanced card shadows based on theme */
        .card { transition: all 0.3s ease; }
        .card:hover { box-shadow: var(--shadow-lg); }
        
        /* Network status indicator */
        .network-online { color: #4caf50; }
        .network-offline { color: #f44336; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAYYE4-vtk3XXPdvwJ8-BWxiyJiKPASsnM",
            authDomain: "savers-group-app.firebaseapp.com",
            projectId: "savers-group-app",
            storageBucket: "savers-group-app.firebasestorage.app",
            messagingSenderId: "722000008713",
            appId: "1:722000008713:web:5322f5a668bfcd6ff4cad8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let members = [], currentUser = null, selectedLoanMemberId = null, screenHistory = [];
        const RULES = { MIN_SAVINGS: 200, MEMBERSHIP_FEE: 50, SOCIAL_FUND: 100, INTEREST: 0.10 };
        
        function navigateTo(screenFn, screenName) { screenHistory.push(screenName); updateNavButtons(); screenFn(); }
        function goBack() { if (screenHistory.length > 1) { screenHistory.pop(); updateNavButtons(); const prev = screenHistory[screenHistory.length-1]; if (prev === 'admin' && currentUser?.type === 'admin') showAdminDashboard(); else if (prev === 'member' && currentUser?.type === 'member') showMemberDashboard(currentUser.id); else logout(); } else logout(); }
        function updateNavButtons() { const backBtn = document.getElementById('backBtn'); if (backBtn) backBtn.style.display = screenHistory.length > 1 ? 'flex' : 'none'; }
        
        const NotificationManager = {
            notifications: [], init() { const saved = localStorage.getItem('notifications'); this.notifications = saved ? JSON.parse(saved) : []; },
            add(message, type='info') { const n = { id: Date.now(), message, type, timestamp: new Date().toISOString(), read: false }; this.notifications.unshift(n); this.save(); this.renderBadge(); this.showToast(message, type); },
            save() { localStorage.setItem('notifications', JSON.stringify(this.notifications)); },
            markAsRead(id) { const n = this.notifications.find(n=>n.id===id); if(n) n.read=true; this.save(); this.renderBadge(); this.renderDropdown(); },
            markAllRead() { this.notifications.forEach(n=>n.read=true); this.save(); this.renderBadge(); this.renderDropdown(); },
            showToast(msg, type) { const toast = document.createElement('div'); toast.style.cssText = `position:fixed;top:20px;left:16px;right:16px;background:${type==='success'?'#2e7d32':type==='error'?'#f44336':'#1e88e5'};color:white;padding:14px;border-radius:12px;z-index:9999;animation:slideDown 0.3s;max-width:400px;margin:auto;`; toast.innerHTML = `<i class="fas ${type==='success'?'fa-check-circle':'fa-info-circle'}"></i> ${msg}`; document.body.appendChild(toast); setTimeout(()=>toast.remove(), 3000); },
            renderBadge() { 
                const unread = this.notifications.filter(n=>!n.read).length;
                const badgeInMenu = document.getElementById('notificationBadge');
                const badgeInHeader = document.getElementById('notificationBadgeTop');
                const display = unread>0?'flex':'none';
                if(badgeInMenu) { badgeInMenu.textContent = unread; badgeInMenu.style.display = display; }
                if(badgeInHeader) { badgeInHeader.textContent = unread; badgeInHeader.style.display = display; }
            },
            renderDropdown() { const c = document.getElementById('notificationDropdown'); if(!c) return; let html = '<div style="padding:16px;border-bottom:1px solid var(--border-color);"><div style="display:flex;justify-content:space-between;"><h4>Notifications</h4><button onclick="NotificationManager.markAllRead();" style="background:none;border:none;color:var(--primary);">Mark all read</button></div></div>'; if(this.notifications.length===0) html+='<div style="padding:32px;text-align:center;">No notifications</div>'; else this.notifications.slice(0,5).forEach(n=>{ html+=`<div onclick="NotificationManager.markAsRead(${n.id})" style="padding:16px;border-bottom:1px solid var(--border-color);${!n.read?'background:rgba(30,136,229,0.05);':''}"><div><i class="fas ${n.type==='success'?'fa-check-circle':'fa-info-circle'}"></i> ${n.message}<div style="font-size:11px;">${new Date(n.timestamp).toLocaleDateString()}</div></div></div>`; }); c.innerHTML = html; }
        };
        
        const ThemeManager = { 
            init() { const theme = localStorage.getItem('theme')||'light'; document.documentElement.setAttribute('data-theme', theme); }, 
            toggle() { const curr = document.documentElement.getAttribute('data-theme'); const next = curr==='light'?'dark':'light'; document.documentElement.setAttribute('data-theme', next); localStorage.setItem('theme', next); this.updateUI(); }, 
            updateUI() { const t = document.getElementById('themeToggle'); if(t) t.innerHTML = document.documentElement.getAttribute('data-theme')==='light'?'<i class="fas fa-moon"></i><span>Dark Mode</span>':'<i class="fas fa-sun"></i><span>Light Mode</span>'; },
            closeAllMenus() { document.querySelectorAll('.menu-dropdown.active, .notification-dropdown.active').forEach(el=>el.classList.remove('active')); }
        };
        
        async function loadMembers() { try { const doc = await db.collection('groups').doc('main').get(); if(doc.exists) members = doc.data().members || []; else members = []; localStorage.setItem('members', JSON.stringify(members)); } catch(e) { const local = localStorage.getItem('members'); if(local) members = JSON.parse(local); } }
        async function saveMembers() { localStorage.setItem('members', JSON.stringify(members)); if(!navigator.onLine) return; try { await db.collection('groups').doc('main').set({ members, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }); } catch(e) { console.log(e); } }
        function fmtDate(iso) { try { return new Date(iso).toLocaleDateString('en-ZM'); } catch(e) { return iso; } }
        function formatCurrency(amt) { return 'K' + (amt||0).toLocaleString(); }
        function closeAllMenus() { ThemeManager.closeAllMenus(); }
        
        // ===== LOGIN =====
        function showAdminLogin() { document.getElementById('loginForm').innerHTML = `<input type="text" id="username" value="admin" placeholder="Admin username"><input type="password" id="password" value="ChiSave" placeholder="Admin password"><button class="btn" onclick="login('admin')">🔐 ADMIN LOGIN</button>`; }
        function showMemberLogin() { const form = document.getElementById('loginForm'); if(!members.length) { form.innerHTML = '<div>Loading members...</div>'; loadMembers().then(()=>showMemberLogin()); return; } form.innerHTML = `<select id="memberSelect"><option value="">-- Select Your Name --</option>${members.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select><input type="password" id="memberPass" placeholder="PIN (last 4 digits)"><button class="btn" onclick="login('member')" style="background:#26a69a;">👤 MEMBER LOGIN</button>`; }
        function login(type) { if(type==='admin') { const u = document.getElementById('username')?.value, p = document.getElementById('password')?.value; if(u==='admin' && p==='ChiSave') { currentUser = { type:'admin', name:'Admin' }; NotificationManager.add('Welcome back, Admin!','success'); screenHistory = ['login','admin']; showAdminDashboard(); } else alert('Wrong username or password'); } else { const mid = document.getElementById('memberSelect')?.value, pass = document.getElementById('memberPass')?.value; if(!mid) { alert('Select your name'); return; } const m = members.find(m=>m.id===mid); const expectedPin = m.pin || (m.phone || '').slice(-4); if(m && pass === expectedPin) { currentUser = { type:'member', name:m.name, id:m.id }; NotificationManager.add(`Welcome back, ${m.name}!`,'success'); screenHistory = ['login','member']; showMemberDashboard(m.id); } else alert('Wrong PIN'); } }
        function logout() { currentUser = null; closeAllMenus(); screenHistory = ['login']; showLoginScreen(); }
        function showLoginScreen() {
            screenHistory=['login'];
            document.getElementById('app').innerHTML = `
                <div class="header" style="animation: fadeInUp 0.5s ease forwards;">
                    <div class="header-title"><h1>💰 SAVERS GROUP</h1><p>Digital Savings System</p></div>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <div class="nav-btn" onclick="ThemeManager.toggle()" title="Toggle Theme" style="background:rgba(255,255,255,0.2);"><i class="fas fa-adjust"></i></div>
                        <div id="networkStatus" style="background:rgba(255,255,255,0.15);padding:6px 12px;border-radius:20px;font-size:12px;">● Online</div>
                    </div>
                </div>
                <div style="padding:16px;">
                    <div class="card login-card" style="max-width:400px;margin:20px auto;animation: fadeInUp 0.6s ease forwards;animation-delay:0.2s;opacity:0;">
                        <div style="text-align:center;margin-bottom:24px;">
                            <div style="width:80px;height:80px;margin:0 auto 16px;background:linear-gradient(135deg,#1e88e5,#42a5f5);border-radius:20px;display:flex;align-items:center;justify-content:center;box-shadow: 0 8px 24px rgba(37,99,235,0.3);animation: pulse 2s infinite;">
                                <i class="fas fa-piggy-bank" style="font-size:36px;color:white;"></i>
                            </div>
                            <h2 style="margin-bottom:8px;">Welcome Back</h2>
                            <p style="color:var(--text-secondary);font-size:14px;">Login to manage your savings</p>

        async function saveEditedMember(memberId) {
            const member = members.find(m => m.id === memberId);
            if (!member) return;
            const name = document.getElementById('editName')?.value.trim();
            const phone = document.getElementById('editPhone')?.value.trim();
            const createdDate = document.getElementById('editCreatedDate')?.value;
            const pin = document.getElementById('editPin')?.value.trim();
            const savings = parseFloat(document.getElementById('editSavings')?.value) || 0;
            const loan = parseFloat(document.getElementById('editLoan')?.value) || 0;
            const membershipPaid = document.getElementById('editMembership')?.checked || false;
            const socialPaid = document.getElementById('editSocial')?.checked || false;
            if (!name) { alert('Name cannot be empty'); return; }
            Object.assign(member, { name, phone, createdDate: createdDate ? new Date(createdDate).toISOString() : member.createdDate, pin, savings, loanPrincipal: loan, membershipPaid, socialPaid });
            member.transactions = member.transactions || [];
            member.transactions.push({ type: 'admin-edit', amount: 0, date: new Date().toISOString(), note: 'Admin edited member' });
            await saveMembers();
            NotificationManager.add('Member updated successfully', 'success');
            viewMember(member.id);
        }
        
        async function resetMemberPin(memberId) {
            const member = members.find(m => m.id === memberId);
            if (!member) return;
            if (confirm(`Reset PIN for ${member.name} to last 4 digits of phone?`)) {
                member.pin = (member.phone || '').slice(-4) || '0000';
                await saveMembers();
                NotificationManager.add(`PIN reset to ${member.pin}`, 'success');
                viewMember(member.id);
            }
        }
        
        async function deleteMember(memberId) {
            const member = members.find(m => m.id === memberId);
            if (!member) return;
            if (confirm(`Delete ${member.name}? This cannot be undone.`)) {
                const index = members.indexOf(member);
                if (index > -1) { members.splice(index, 1); await saveMembers(); NotificationManager.add('Member deleted', 'success'); showAllMembers(); }
            }
        }

        function toggleMemberMenu(e) { e.stopPropagation(); closeAllMenus(); const m=document.getElementById('memberMenu'); if(m) m.classList.toggle('active'); }
        function toggleNotifications(e) { e.stopPropagation(); closeAllMenus(); const d=document.getElementById('notificationDropdown'); if(d) { d.classList.toggle('active'); NotificationManager.renderDropdown(); } }
        document.addEventListener('click',()=>closeAllMenus());
        
        // Make all functions global
        window.showHistoryPage = showHistoryPage; window.exportHistoryCSV = exportHistoryCSV; window.exportHistoryPDF = exportHistoryPDF; window.showImportMembersCSV = showImportMembersCSV; window.showImportTransactionsCSV = showImportTransactionsCSV; window.confirmMemberImport = confirmMemberImport; window.confirmTransactionImport = confirmTransactionImport; window.showEditMember = showEditMember; window.saveEditedMember = saveEditedMember; window.resetMemberPin = resetMemberPin; window.deleteMember = deleteMember; window.viewMember = viewMember; window.addSavingsFor = addSavingsFor; window.addLoanFor = addLoanFor; window.collectFee = collectFee; window.processSavings = processSavings; window.contractLoan = contractLoan; window.repayLoan = repayLoan; window.memberResetPin = memberResetPin; window.toggleAdminMenu = toggleAdminMenu; window.toggleMemberMenu = toggleMemberMenu; window.toggleNotifications = toggleNotifications;
        
        (async () => { NotificationManager.init(); ThemeManager.init(); await loadMembers(); showLoginScreen(); })();
    </script>
</body>
